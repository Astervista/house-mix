name: Release Build & Publish

on:
  release:
    types: [ published ]

permissions:
  contents: read
  packages: write

jobs:
  publish-bundle:
    runs-on: ubuntu-latest
    steps:
      # Check out the repo
      - uses: actions/checkout@v3

      # Package the bundle folder
      - name: Create bundle artifact
        run: |
          mkdir -p bundle-artifact
          cp -r containers/bundle/* bundle-artifact/
          zip -r house-mix-bundle.zip bundle-artifact

      # Upload as a release artifact
      - name: Upload bundle artifact
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./house-mix-bundle.zip
          asset_name: house-mix-bundle.zip
          asset_content_type: application/zip

  backend:
    name: Build & Publish NestJS Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Cache Common Dependencies
        uses: actions/cache@v3
        with:
          path: common/node_modules
          key: common-deps-${{ hashFiles('common/package-lock.json') }}

      - name: Install Common Dependencies
        working-directory: ./common
        run: npm ci

      - name: Build Backend
        working-directory: ./backend
        run: npm run build

      - name: Publish Backend Package to GitHub Packages
        working-directory: ./backend
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    name: Build & Publish Angular Frontend Docker Image
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Cache Common Dependencies
        uses: actions/cache@v3
        with:
          path: common/node_modules
          key: common-deps-${{ hashFiles('common/package-lock.json') }}

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Angular Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./containers/frontend/Dockerfile
          push: true
          tags: ghcr.io/astervista/house-mix-frontend:${{ github.event.release.tag_name }}
