name: Release Build & Publish

on:
  release:
    types: [ published ]

permissions:
  contents: write
  packages: write

jobs:
  publish-bundle:
    runs-on: ubuntu-latest
    steps:
      # Check out the repo
      - uses: actions/checkout@v3

      # Package the bundle folder
      - name: Create bundle artifact
        run: |
          mkdir -p bundle-artifact
          cp -r containers/bundle/* bundle-artifact/
          zip -r house-mix-bundle.zip bundle-artifact

      # Upload as a release artifact
      - name: Upload bundle artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./house-mix-bundle.zip
          asset_name: house-mix-bundle.zip
          asset_content_type: application/zip

  backend:
    name: Build & Publish NestJS Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com

      - name: Cache Common Dependencies
        uses: actions/cache@v3
        with:
          path: common/node_modules
          key: common-deps-${{ hashFiles('common/package-lock.json') }}

      - name: Install Common Dependencies
        working-directory: ./common
        run: npm ci

      - name: Cache Backend Dependencies
        uses: actions/cache@v3
        with:
          path: backend/node_modules
          key: backend-deps-${{ hashFiles('backend/package-lock.json') }}

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build Backend
        working-directory: ./backend
        run: npm run build

      - name: Use package README
        working-directory: ./backend
        run: cp README-package.md README.md -f

      - name: Publish Backend Package to GitHub Packages
        working-directory: ./backend
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    name: Build & Publish Angular Frontend Docker Image
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Restore Common Dependencies Cache
        uses: actions/cache@v3
        with:
          path: common/node_modules
          key: common-deps-${{ hashFiles('common/package-lock.json') }}

      - name: Cache Common Output
        uses: actions/cache@v3
        with:
          path: common/dist
          key: common-deps-${{ hashFiles('common/package-lock.json') }}

      - name: Cache Frontend Dependencies
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: frontend-deps-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Angular Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./containers/frontend/Dockerfile
          push: true
          tags: ghcr.io/astervista/house-mix-frontend:${{ github.event.release.tag_name }}

  publish-docs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: [backend, frontend] # Ensure backend and frontend are built first
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      # Restore caches for all dependencies
      - name: Restore Common Dependencies Cache
        uses: actions/cache@v3
        with:
          path: common/node_modules
          key: common-deps-${{ hashFiles('common/package-lock.json') }}

      - name: Restore Common Output Cache
        uses: actions/cache@v3
        with:
          path: common/dist
          key: common-deps-${{ hashFiles('common/package-lock.json') }}

      - name: Restore Backend Dependencies Cache
        uses: actions/cache@v3
        with:
          path: backend/node_modules
          key: backend-deps-${{ hashFiles('backend/package-lock.json') }}

      - name: Restore Frontend Dependencies Cache
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: frontend-deps-${{ hashFiles('frontend/package-lock.json') }}

      # Install documentation dependencies (only place they are needed)
      - name: Cache Documentation Dependencies
        uses: actions/cache@v3
        with:
          path: documentation/node_modules
          key: docs-deps-${{ hashFiles('documentation/package-lock.json') }}

      - name: Install Documentation Dependencies
        working-directory: ./documentation
        run: npm ci

      - name: Build Common TypeDoc
        working-directory: ./common
        run: npx typedoc --options typedoc.config.mjs

      - name: Build Backend TypeDoc
        working-directory: ./backend
        run: npx typedoc --options typedoc.config.mjs

      - name: Build Frontend TypeDoc
        working-directory: ./frontend
        run: npx typedoc --options typedoc.config.mjs

      - name: Generate OpenAPI Spec
        working-directory: ./documentation
        run: npx sourcey build -o ./rest/

      - name: Transform Version for Path
        run: |
          VERSION_TAG="${{ github.event.release.tag_name }}"
          VERSION_WITHOUT_V="${VERSION_TAG#v}"
          echo "VERSION_PATH=$(echo $VERSION_WITHOUT_V | tr '.' '_')" >> $GITHUB_ENV
          echo "VERSION_ID=$VERSION_WITHOUT_V" >> $GITHUB_ENV

      # 4. Connect via SSH to make sure the folder exists
      - name: Prepare Server Environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.DOCS_PUB_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: 8022
          script: |
            # -p ensures it creates the full path, and won't error if it already exists
            mkdir -p /home/${{ secrets.DOCS_PUB_SSH_USER }}/sources/house-mix/${{ env.VERSION_PATH }}

      # 5. Now copy the files safely
      - name: Copy files to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.DOCS_PUB_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: 8022
          source: |
            ./documentation/rest
            ./documentation/frontend
            ./documentation/backend
            ./documentation/common
            ./documentation/fonts
            ./documentation/assets
            ./documentation/index.html
            ./documentation/custom-style.css
            ./documentation/custom-script.js
            ./documentation/REST.json
          target: "/home/${{ secrets.DOCS_PUB_SSH_USER }}/sources/house-mix/${{ env.VERSION_PATH }}"
          strip_components: 1 # This will remove the 'documentation/' prefix from the copied files/folders

      # 6. Trigger Remote API Callback
      - name: Trigger Remote API Callback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.DOCS_PUB_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: 8022
          script: |
            curl -X POST localhost:3000/projects/house-mix/versions \
            -H "Content-Type: application/json" \
            -d '{"versionId": "${{ env.VERSION_ID }}", "setCurrent": true, "setBeta": false}'
