name: Release Build & Publish

on:
  release:
    types: [ published ]

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Build & Publish NestJS Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build Backend
        working-directory: ./backend
        run: npm run build

      - name: Publish Backend Package to GitHub Packages
        working-directory: ./backend
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    name: Build & Publish Angular Frontend Docker Image
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Angular Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./containers/frontend/Dockerfile
          push: true
          tags: ghcr.io/astervista/house-mix-frontend:${{ github.event.release.tag_name }}
