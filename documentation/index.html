            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                width: 100%;
                user-select: none;
            }

            body {
                background-color: #ffffff;
                color: #1f2328;
                display: flex;
                flex-direction: column;
                align-items: stretch;
                font-family: "Fira Sans", sans-serif;
            }

            #content {
                flex-grow: 1;
                flex-basis: 0;
                display: flex;
                flex-direction: column;
                padding: 20px 10px;
            }

            #footer{
                border-top: solid 1px;
            }

            #nav-bar {
                border-bottom: solid 1px;
            }

            #footer,
            #nav-bar {
                background-color: #f6f8fa;
                border-color: #d1d9e0;
                height: 64px;
                display: flex;
                align-items: center;
            }

            @media (max-width: 500px) {

                #footer,
                #nav-bar {
                    flex-direction: column;
                    height: initial;
                    gap: 5px;
                    padding: 10px;
                }
            }

            html[data-theme=dark] body {
                background-color: #0d1117;
                color: #f0f6fc;
            }
            html[data-theme=dark] #footer,
            html[data-theme=dark] #nav-bar {
                    background-color: #010409;
                    border-color: #383e48;
            }

            @media (prefers-color-scheme: dark) {
                html[data-theme=os] body {
                    background-color: #0d1117;
                    color: #f0f6fc;
                }

                html[data-theme=os] #footer,
                html[data-theme=os] #nav-bar {
                    background-color: #010409;
                    border-color: #383e48;
                }
            }

            #nav-bar .banner {
                height: 54px;
                margin: 3px auto;
            }

            .banner.dark {
                display: none;
            }

            html[data-theme=dark] .banner.dark {
                display: block;
            }
            html[data-theme=dark] .banner.light {
                display: none;
            }

            @media (prefers-color-scheme: dark) {
                html[data-theme=os] body {
                    background-color: #0d1117;
                    color: #f0f6fc;
                }
                html[data-theme=os] .banner.dark {
                    display: block;
                }
                html[data-theme=os] .banner.light {
                    display: none;
                }
            }

            .theme-container {
                width: initial;
                margin: 0 auto;
            }

            .version-selector {
                position: absolute;
                right: 0;
            }

            h1, h2, p {
                text-align: center;
                font-weight: 200;
                margin: 15px 0;
            }

            h1 {
                font-size: 2.75rem;
            }

            h2 {
                font-size: 2.25rem;
            }

            p {
                margin: 5px 0;
                font-size: 1.25rem;
            }

            .grid {
                display: flex;
                flex-direction: column;
                flex-grow: 1;
                flex-basis: 0;
                align-items: stretch;
                justify-content: space-evenly;
            }

            .grid .row {
                display: flex;
                align-items: center;
                justify-content: space-evenly;
                flex-wrap: wrap;
                gap: 10px;
            }

            .grid a {
                padding: 20px;
                font-size: 2.5rem;
                font-weight: 300;
                color: var(--color-text);
                text-decoration: none;
                border: solid 2px var(--color-accent);
                border-radius: 10px;
                transition: background-color 0.2s;
            }

            .grid a:focus {
                outline: none;
                background: color-mix(in srgb, var(--color-text-aside), #0000 92%)
            }

            .grid a:hover {
                background: color-mix(in srgb, var(--color-text-aside), #0000 92%)
            }

            .grid a:hover:focus {
                background: color-mix(in srgb, var(--color-text-aside), #0000 82%)
            }

            .grid a:active {
                background: color-mix(in srgb, var(--color-text-aside), #0000 82%)
            }

            .grid a:active:focus {
                background: color-mix(in srgb, var(--color-text-aside), #0000 72%)
            }
            @media (max-width: 500px) {
                html {
                    font-size: 14px;
                }
                .grid a {

                    font-size: 1.5rem;
                }
            }

            #astervista {
                position: absolute;
                display: flex;
                padding: 5px 10px;
                align-items: stretch;
                height: 50px;
                gap: 10px;
                text-decoration: none;
                color: var(--color-text)
            }

            #astervista img {
                height: 100%;
            }

            #astervista .text {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }

            #astervista .name {
                font-size: 1.2rem;
                font-weight: 200;
                font-family: "Montserrat", sans-serif;
            }

            #astervista .subtitle {
                font-family: "Hepta Slab", monospace;
                font-size: 1rem;
            }

            #openapi,
            #github {
                height: 30px;
                width: 30px;
            }
            #links {

            }

            #links {
                position: absolute;
                right: 20px;
                display: flex;
                gap: 10px
            }

            #openapi svg,
            #github svg {
                width: 100%;
                height: 100%;
            }

            @media (max-width: 800px) {

                #astervista .name {

                    font-size: 1rem;

                }

                #astervista .subtitle {
                    font-size: 0.8rem;
                    width: 100px;
                }
            }

            @media (max-width: 500px) {
                #astervista, #links {
                    position: relative;
                    right: 0;
                    left: 0;
                    top: 0;
                    bottom: 0;
                }

                #astervista {
                    order: 2
                }
                #links {
                    order: 2
                }

                .theme-container {
                    margin: 10px 0;
                    order: 1;
                }

                .version-selector {
                    position: relative;
                    margin: 5px 0;
                    padding-left: 30px;
                }
            }

        </style>
        <script>
            document.documentElement.dataset.theme = localStorage.getItem("tsd-theme") || "os";
