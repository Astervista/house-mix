<?xml version="1.0" encoding="UTF-8"?>
<!-- Dynamic SVG -->
<svg id="Layer_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 100 100">
    <defs>
        <style>
            .dynamic-stroke-main {
                stroke: var(--ink-color, #000);
                stroke-width: 4.5px;
            }

            .dynamic-stroke-main, .dynamic-stroke-accent {
                fill: none;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            .dynamic-stroke-accent {
                stroke: var(--highlight-color, #000);
                stroke-width: 2px;
            }
        </style>
    </defs>
    <circle r="10" cx="50" cy="50" class="dynamic-stroke-main"></circle>
    <circle r="27.5" cx="50" cy="50" class="dynamic-stroke-accent stroke-color-animation"></circle>
    <circle r="45" cx="50" cy="50" class="dynamic-stroke-main"></circle>
</svg>
