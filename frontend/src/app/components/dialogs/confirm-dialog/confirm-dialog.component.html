<h2 mat-dialog-title>{{ data.title || 'Confirm' }}</h2>
<div mat-dialog-content>{{ data.message }}</div>
<div mat-dialog-actions>
  <button mat-button (click)="closeDialog(false)">{{ data.cancelText || 'Cancel' }}</button>
  <button mat-button
          [ngClass]="{'confirm-warn': data.warn}"
          (click)="closeDialog(true)">
    {{ data.confirmText || 'Ok' }}
  </button>
</div>
