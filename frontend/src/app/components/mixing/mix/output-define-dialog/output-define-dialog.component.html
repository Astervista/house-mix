<h2 mat-dialog-title>Define a new output</h2>
<mat-dialog-content>
    <mat-form-field>
        <mat-label>Data type</mat-label>
        <mat-select [formControl]="typeFormControl">
            @for (type of Object.values(DatumType); track type) {
                <mat-option [value]="type">
                    <div
                        class="type-container">
                        <span class="type-circle"
                              [class.selected]="typeFormControl.value == type"
                              [style.--type-color]="getColorVarNameForType(type)"></span>
                        {{ DatumTypeDisplay[type] }}
                    </div>
                </mat-option>
            }
        </mat-select>
    </mat-form-field>
    <mat-form-field class="example-full-width">
        <mat-label>Name</mat-label>
        <input matInput [formControl]="nameFormControl">
    </mat-form-field>
    <mat-checkbox class="example-margin" [formControl]="nullableFormControl">Nullable</mat-checkbox>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-button [mat-dialog-close]="null">Cancel</button>
    <button mat-button [mat-dialog-close]="result" [disabled]="result == null">Define</button>
</mat-dialog-actions>
