<h2 mat-dialog-title>Select an input</h2>
<mat-dialog-content>
    <div class="option-list">
        @for (exp of availableExports; track exp) {
            <div
                class="export-option"
                [class.selected]="selectedExport == exp"
                (click)="selectedExport = exp">{{exp.name}} from {{exp.origin}} {{exp.originId}}
            </div>
        }
    </div>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-button [mat-dialog-close]="null">Cancel</button>
    <button mat-button [mat-dialog-close]="selectedExport" [disabled]="selectedExport == null">Select</button>
</mat-dialog-actions>
