        <style>
            html {
                --splash-background: white;
                --splash-ink: #303030
            }

            html.dark {
                --splash-background: #1A1A1A;
                --splash-ink: white;
            }

            body {
                background: var(--splash-background);
            }

            #splash-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 10px;
                background: var(--splash-background);
                transition: opacity .5s;
                z-index: 100;
            }

            #splash-screen.out {
                opacity: 0;
                pointer-events: none;
            }

            #splash-screen svg {
                width: min(50vw, 50vh);
                height: min(50vw, 50vh);
                --left-slider-position: 0;
                --right-slider-position: 0;
                --middle-slider-position: 0;
                --pot-position: 0;
                --slider-in-position-1st: 0;
                --slider-in-position-2nd: 0;
                --pot-in-position: 0;
                --tracks-in-position: 0;
            }
        </style>

        <script>

            var NEWTON_ITERATIONS          = 4;
            var NEWTON_MIN_SLOPE           = 0.001;
            var SUBDIVISION_PRECISION      = 0.0000001;
            var SUBDIVISION_MAX_ITERATIONS = 10;

            var kSplineTableSize = 11;
            var kSampleStepSize  = 1.0 / (kSplineTableSize - 1.0);

            var float32ArraySupported = typeof Float32Array === "function";

            function A(aA1, aA2) { return 1.0 - 3.0 * aA2 + 3.0 * aA1; }

            function B(aA1, aA2) { return 3.0 * aA2 - 6.0 * aA1; }

            function C(aA1) { return 3.0 * aA1; }

            // Returns x(t) given t, x1, and x2, or y(t) given t, y1, and y2.
            function calcBezier(aT, aA1, aA2) { return ((A(aA1, aA2) * aT + B(aA1, aA2)) * aT + C(aA1)) * aT; }

            // Returns dx/dt given t, x1, and x2, or dy/dt given t, y1, and y2.
            function getSlope(aT, aA1, aA2) { return 3.0 * A(aA1, aA2) * aT * aT + 2.0 * B(aA1, aA2) * aT + C(aA1); }

            function binarySubdivide(aX, aA, aB, mX1, mX2) {
                var currentX, currentT, i = 0;
                do {
                    currentT = aA + (aB - aA) / 2.0;
                    currentX = calcBezier(currentT, mX1, mX2) - aX;
                    if (currentX > 0.0) {
                        aB = currentT;
                    } else {
                        aA = currentT;
                    }
                } while (Math.abs(currentX) > SUBDIVISION_PRECISION && ++i < SUBDIVISION_MAX_ITERATIONS);
                return currentT;
            }

            function newtonRaphsonIterate(aX, aGuessT, mX1, mX2) {
                for (var i = 0; i < NEWTON_ITERATIONS; ++i) {
                    var currentSlope = getSlope(aGuessT, mX1, mX2);
                    if (currentSlope === 0.0) {
                        return aGuessT;
                    }
                    var currentX = calcBezier(aGuessT, mX1, mX2) - aX;
                    aGuessT -= currentX / currentSlope;
                }
                return aGuessT;
            }

            function LinearEasing(x) {
                return x;
            }

            function bezier(mX1, mY1, mX2, mY2) {
                if (!(0 <= mX1 && mX1 <= 1 && 0 <= mX2 && mX2 <= 1)) {
                    throw new Error("bezier x values must be in [0, 1] range");
                }

                if (mX1 === mY1 && mX2 === mY2) {
                    return LinearEasing;
                }

                // Precompute samples table
                var sampleValues = float32ArraySupported ? new Float32Array(kSplineTableSize) : new Array(kSplineTableSize);
                for (var i = 0; i < kSplineTableSize; ++i) {
                    sampleValues[i] = calcBezier(i * kSampleStepSize, mX1, mX2);
                }

                function getTForX(aX) {
                    var intervalStart = 0.0;
                    var currentSample = 1;
                    var lastSample    = kSplineTableSize - 1;

                    for (; currentSample !== lastSample && sampleValues[currentSample] <= aX; ++currentSample) {
                        intervalStart += kSampleStepSize;
                    }
                    --currentSample;

                    // Interpolate to provide an initial guess for t
                    var dist      = (aX - sampleValues[currentSample]) / (sampleValues[currentSample + 1] - sampleValues[currentSample]);
                    var guessForT = intervalStart + dist * kSampleStepSize;

                    var initialSlope = getSlope(guessForT, mX1, mX2);
                    if (initialSlope >= NEWTON_MIN_SLOPE) {
                        return newtonRaphsonIterate(aX, guessForT, mX1, mX2);
                    } else if (initialSlope === 0.0) {
                        return guessForT;
                    } else {
                        return binarySubdivide(aX, intervalStart, intervalStart + kSampleStepSize, mX1, mX2);
                    }
                }

                return function BezierEasing(x) {
                    // Because JavaScript number are imprecise, we should guarantee the extremes are right.
                    if (x === 0) {
                        return 0;
                    }
                    if (x === 1) {
                        return 1;
                    }
                    return calcBezier(getTForX(x), mY1, mY2);
                };
            }

                RIGHT_SLIDER_POSITION:   "--right-slider-position",

                SLIDER_IN_POSITION_1_ST: "--slider-in-position-1st",
                SLIDER_IN_POSITION_2_ND: "--slider-in-position-2nd",
                POT_IN_POSITION:         "--pot-in-position",
                TRACKS_IN_POSITION:      "--tracks-in-position",

                timeline: [
                    {
                        from:           0,
                        to:             1,
                        property:       window.splashScreenConstants.TRACKS_IN_POSITION,
                        easing:         bezier(0.5, 0, 0.5, 1),

                    },
                    {

                        easingStrength: 1,
                        subTimeline:    [

                            }, {
                                from:     0.5,
                                to:       1,
                                property: window.splashScreenConstants.SLIDER_IN_POSITION_2_ND
                            }
                        ]
                    },
                    {
                        from:     1.2,
                        to:       2.2,
                        max:      0.5,
                        property: window.splashScreenConstants.LEFT_SLIDER_POSITION,
                        easing:   bezier(0.5, 0, 0.5, 1)
                    },
                    {
                        from:     2.2,
                        to:       3,
                        min:      0.5,
                        max:      0.1,
                        property: window.splashScreenConstants.LEFT_SLIDER_POSITION,
                        easing:   bezier(0.5, 0, 0.5, 1)
                    },
                    {
                        from:     3,
                        to:       3.8,
                        min:      0.1,
                        max:      0.5321100917,
                        property: window.splashScreenConstants.LEFT_SLIDER_POSITION,
                        easing:   bezier(0.5, 0, 0.5, 1)
                    },
                    {
                        from:     1.2,
                        to:       2.6,
                        max:      0.8,
                        property: window.splashScreenConstants.RIGHT_SLIDER_POSITION,
                        easing:   bezier(0.5, 0, 0.5, 1)
                    },
                    {
                        from:     2.6,
                        to:       3.8,
                        min:      0.8,
                        max:      0.5321100917,
                        property: window.splashScreenConstants.RIGHT_SLIDER_POSITION,
                        easing:   bezier(0.5, 0, 0.5, 1)
                    },
                    {
                        from:     1.2,
                        to:       2.5,
                        property: window.splashScreenConstants.MIDDLE_SLIDER_POSITION,
                        easing:   bezier(0.5, 0, 0.5, 1)
                    },
                    {
                        from:     2.5,
                        to:       3.8,
                        min:      1,
                        max:      0,
                        property: window.splashScreenConstants.MIDDLE_SLIDER_POSITION,
                        easing:   bezier(0.5, 0, 0.5, 1)
                    },
                    {
                        from:     0.3,
                        to:       1.3,
                        property: window.splashScreenConstants.POT_IN_POSITION,
                        easing:   bezier(0.25, 0, 0.25, 1)
                    },
                    {
                        from:     1.3,
                        to:       2.3,
                        max:      .8,
                        property: window.splashScreenConstants.POT_POSITION,
                        easing:   bezier(0.4, 0, 0.4, 1)
                    },
                    {
                        from:     2.3,
                        to:       3.3,
                        min:      .8,
                        max:      0,
                        property: window.splashScreenConstants.POT_POSITION,
                        easing:   bezier(0.4, 0, 0.4, 1)
                    }
                ]
            };


            function lerp(value, fromMin, fromMax, toMin, toMax) {
                return toMin + (toMax - toMin) * (value - fromMin) / (fromMax - fromMin);
            }


            function setSubTimelines(timeline, position) {
                let progress = Math.max(0, Math.min(1, lerp(position, timeline.from, timeline.to, 0, 1)));
                if (typeof timeline.easing == "function") {
                    progress = timeline.easing(progress);
                }
                progress = lerp(progress, 0, 1, timeline.min == null ? 0 : timeline.min, timeline.max == null ? 1 : timeline.max);
                if (timeline.property != null) {
                    window.splashScreen.svg.style.setProperty(timeline.property, progress);
                }
                if (timeline.subTimeline != null) {
                    for (let subEvent of timeline.subTimeline) {
                        setSubTimelines(subEvent, progress);
                    }
                }
            }

            function animation() {
                let someStill = false;
                for (let i = 0; i < window.splashScreen.timeline.length; i++) {
                    let event = window.splashScreen.timeline[i];
                    if (event.to < window.splashScreen.progress) {
                        setSubTimelines(event, event.to);
                        continue;
                    }
                    if (event.from <= window.splashScreen.progress) {
                        setSubTimelines(event, window.splashScreen.progress);
                        someStill = true;
                    } else {
                        break;
                    }
                }
                let newTimestamp = Date.now();
                window.splashScreen.progress += (newTimestamp - window.splashScreen.lastTimestamp) / 1000;
                window.splashScreen.lastTimestamp    = newTimestamp;
                if (!someStill) {
                    window.splashScreen.active = false;
                    if (window.splashScreen.scheduleOut) {
                        out();
                        window.splashScreen.scheduleOut = false;
                    } else if (window.splashScreen.scheduleRemoveSplash) {
                        window.splashScreen.splashScreen.classList.add("out");
                        setTimeout(() => window.splashScreen.splashScreen.remove(), 2000);
                    }
                }
                if (window.splashScreen.active) {
                    requestAnimationFrame(animation);
                }
            }

            function restart(resetProperties = true) {
                if (resetProperties) {
                    window.splashScreen.svg.style.setProperty("--left-slider-position", `0`);
                    window.splashScreen.svg.style.setProperty("--right-slider-position", `0`);
                    window.splashScreen.svg.style.setProperty("--middle-slider-position", `0`);
                    window.splashScreen.svg.style.setProperty("--pot-position", `0`);
                    window.splashScreen.svg.style.setProperty("--slider-in-position-1st", `0`);
                    window.splashScreen.svg.style.setProperty("--slider-in-position-2nd", `0`);
                    window.splashScreen.svg.style.setProperty("--pot-in-position", `0`);
                    window.splashScreen.svg.style.setProperty("--tracks-in-position", `0`);
                }

                window.splashScreen.timeline.sort((a, b) => (a.from - b.from) || (a.to - b.to));

                window.splashScreen.lastTimestamp = Date.now();
                window.splashScreen.progress      = 0;
                if (!window.splashScreen.active) {
                    window.splashScreen.active = true;
                    animation();
                }
            }

            function out() {

                let potIn       = parseFloat(window.splashScreen.svg.style.getPropertyValue(window.splashScreen.POT_IN_POSITION));
                let tracksIn    = parseFloat(window.splashScreen.svg.style.getPropertyValue(window.splashScreen.TRACKS_IN_POSITION));
                let sliderIn2nd = parseFloat(window.splashScreen.svg.style.getPropertyValue(window.splashScreen.SLIDER_IN_POSITION_2_ND));
                let sliderIn1st = parseFloat(window.splashScreen.svg.style.getPropertyValue(window.splashScreen.SLIDER_IN_POSITION_1_ST));
                window.splashScreen.timeline        = [
                    {
                        from:     0,
                        to:       potIn,
                        min:      potIn,
                        max:      0,
                        property: window.splashScreen.POT_IN_POSITION,
                        easing:   bezier(0.25, 0, 0.25, 1)
                    },
                    {
                        from:     0,
                        to:       tracksIn,
                        min:      tracksIn,
                        max:      0,
                        property: window.splashScreen.TRACKS_IN_POSITION,
                        easing:   bezier(0.25, 0, 0.25, 1)
                    },
                    {
                        from:     0,
                        to:       sliderIn2nd / 2,
                        min:      sliderIn2nd,
                        max:      0,
                        property: window.splashScreen.SLIDER_IN_POSITION_2_ND,
                        easing:   bezier(0.25, 0, 0.25, 1)
                    },
                    {
                        from:     sliderIn2nd / 2,
                        to:       sliderIn2nd / 2 + sliderIn1st / 2,
                        min:      sliderIn1st,
                        max:      0,
                        property: window.splashScreen.SLIDER_IN_POSITION_1_ST,
                        easing:   bezier(0.25, 0, 0.25, 1)
                    }
                ];
                restart(false);
                window.splashScreen.scheduleRemoveSplash = true;
            }

            window.hideSplash = () => {
                if (!window.splashScreen.active) {
                    out();
                } else {
                    window.splashScreen.scheduleOut = true;
                }
            };

            window.killSplash = () => {
                window.splashScreen.splashScreen.remove();
            }

            window.splashScreen.svg          = document.getElementById("anim-svg");
            window.splashScreen.splashScreen = document.getElementById("splash-screen");
            window.splashScreen.active = false;
            restart();

            window.onload = () => {
                window.hideSplash();
            }

        </script>
    </body>
</html>
